# RSS 新闻订阅系统配置文件示例
# 复制此文件为 config.yaml 并根据需要修改配置

# LLM (大语言模型) 配置
llm:
  # API 基础地址，支持 OpenAI 兼容的 API
  # 可通过环境变量 LLM_API_BASE 覆盖
  api_base: http://localhost:1234/v1
  
  # 模型名称，根据实际部署的模型修改
  # 可通过环境变量 LLM_MODEL 覆盖
  model: local-model
  
  # 请求超时时间（秒）
  # 可通过环境变量 LLM_TIMEOUT 覆盖
  timeout: 60

# RSS 抓取配置
fetch:
  # 抓取间隔（秒），默认 1 小时
  interval: 3600
  
  # 单次请求超时时间（秒）
  timeout: 30
  
  # 最大重试次数
  max_retries: 3

# 数据库配置
database:
  # 数据库文件路径，相对于项目根目录
  path: data/rss_news.db

# 显示配置
display:
  # 每页显示的新闻数量
  page_size: 20
